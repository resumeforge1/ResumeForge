{% extends "base.html" %}
{% block title %}Login - ResumeForge{% endblock %}
{% block content %}
<section class="hero">
  <div>
    <span class="eyebrow">Secure workspace</span>
    <h1>Log in to ResumeForge</h1>
    <p class="lede">Access your resumes, job matches, packages, and interview prep.</p>
  </div>
</section>

<section class="panel auth-panel">
  {% if error %}<div class="notice error">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="grid two">
    <input type="hidden" name="next_url" value="{{ next_url }}">
    <label>Email<input name="email" type="email" required autocomplete="email"></label>
    <label>Password<input name="password" type="password" required autocomplete="current-password"></label>
    <label class="check-row"><input name="remember_me" type="checkbox" value="1"> Remember me</label>
    <div class="actions">
      <button class="button primary" type="submit">Log In</button>
      <a class="button secondary" href="/forgot-password">Forgot Password</a>
      <a class="button ghost" href="/register">Register</a>
    </div>
  </form>
</section>
{% endblock %}
