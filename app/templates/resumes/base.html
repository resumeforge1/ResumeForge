<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      @page { size: Letter; margin: 0; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: #1b2735;
        font-family: Arial, Helvetica, sans-serif;
        background: white;
      }
      .resume {
        width: 8.5in;
        min-height: 11in;
        padding: 0.34in 0.42in 0.38in;
      }
      .header {
        background: #0f5792;
        color: white;
        margin: -0.34in -0.42in 18px;
        padding: 30px 34px 26px;
      }
      .header h1 {
        font-size: 34px;
        line-height: 1;
        margin: 0 0 8px;
        letter-spacing: 0;
      }
      .target {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 9px;
        text-transform: uppercase;
      }
      .contact {
        font-size: 10.5px;
      }
      .section {
        margin: 0 0 11px;
      }
      h2 {
        color: #0f5792;
        border-bottom: 1px solid #a9c0d5;
        font-size: 11px;
        margin: 0 0 6px;
        padding-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      p {
        font-size: 9.8px;
        line-height: 1.34;
        margin: 0;
      }
      .strengths {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }
      .strength {
        background: #edf5fb;
        border-left: 3px solid #0f5792;
        color: #1d344a;
        font-size: 8.8px;
        font-weight: 700;
        line-height: 1.2;
        min-height: 28px;
        padding: 5px 6px;
      }
      .skills {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .skill {
        border: 1px solid #c8d5df;
        color: #27384a;
        font-size: 8.5px;
        padding: 3px 5px;
      }
      .columns {
        display: grid;
        grid-template-columns: 1.35fr 0.65fr;
        gap: 16px;
      }
      .job {
        margin-bottom: 8px;
      }
      .job-head {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 2px;
      }
      .job-title {
        font-size: 10.2px;
        font-weight: 800;
      }
      .dates {
        color: #596879;
        font-size: 9px;
        white-space: nowrap;
      }
      .employer {
        color: #344a5f;
        font-size: 9.5px;
        font-weight: 800;
        margin-bottom: 2px;
      }
      ul {
        margin: 0;
        padding-left: 14px;
      }
      li {
        font-size: 9.1px;
        line-height: 1.24;
        margin-bottom: 1px;
      }
    </style>
  </head>
  <body>
    <article class="resume">
      <header class="header">
        <h1>{{ client.full_name }}</h1>
        <p class="target">{{ client.target_role }}</p>
        <div class="contact">{{ [client.city_state, client.phone, client.email]|select|join(' | ') }}</div>
      </header>
      {% block resume_content %}{% endblock %}
    </article>
  </body>
</html>
